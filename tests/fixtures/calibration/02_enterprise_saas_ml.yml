jd: |
  We are a Series C enterprise SaaS company building ML-powered analytics
  for B2B customers. We're hiring a Senior ML Engineer to own our
  forecasting and anomaly-detection stack.

  You will:
    - Own end-to-end ML models in Python (Scikit-learn, XGBoost,
      LightGBM, some PyTorch).
    - Build FastAPI microservices for model serving on AWS.
    - Contribute to our feature store and experimentation platform.
    - Collaborate with PMs to translate business needs into model
      objectives.

  Requirements:
    - 4+ years ML/data-science experience.
    - Strong Python; comfort with SQL and data pipelines.
    - Production ML deployment experience.
    - LLM / NLP experience is a plus but not required.

  Charlotte, NC hybrid (3 days onsite).
  We sponsor H-1B for the right candidate.
