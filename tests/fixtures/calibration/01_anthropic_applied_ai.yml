jd: |
  Anthropic is looking for a Senior ML Engineer to join our Applied AI
  team. You will build production RAG systems, LLM-powered developer
  tools, and evaluation infrastructure on top of Claude.

  Responsibilities:
    - Design and ship production LLM / RAG applications end-to-end in
      Python (FastAPI, LangChain).
    - Build retrieval pipelines using sentence-transformers / FAISS /
      Pinecone with human-in-the-loop evaluation.
    - Partner with research on prompt engineering and fine-tuning.
    - Own reliability, cost, and latency of production LLM services.

  What we're looking for:
    - 4+ years of ML/software engineering; Senior IC.
    - Deep Python, strong on OOP and async patterns.
    - Production LLM / RAG experience; familiarity with Claude or GPT-4
      APIs.
    - Experience with vector databases, embeddings, retrieval tuning.
    - AWS or GCP, Docker, CI/CD.

  Location: Remote (US) or SF / NYC hybrid.
  Visa: we regularly sponsor H-1B and have a strong immigration team.
