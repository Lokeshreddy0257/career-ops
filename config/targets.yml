# config/targets.yml
# Target companies. The `h1b_history` tag feeds directly into the
# visa-sponsorship rubric dimension. Values:
#   - "heavy"     → 10+ LCAs/year in last 3 years
#   - "active"    → sponsored in last 3 years, lower volume
#   - "occasional"→ has sponsored but not recently
#   - "none"      → no LCAs on file
#   - "unknown"   → private / small / stealth
#
# Verify before adding a company: https://h1bdata.info or myvisajobs.com
# (public DOL LCA filings). Update this file quarterly.

companies:

